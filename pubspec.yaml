name: anti_finance
description: Anti-Self-Deception Finance — AI Behavioral Finance App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3
  retrofit: ^4.9.2
  pretty_dio_logger: ^1.3.1

  # Local Storage
  # isar: ^3.1.0+1  # removed - not used yet, requires extra iOS setup
  # isar_flutter_libs: ^3.1.0+1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # Utils
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0

  # Payments
  purchases_flutter: ^10.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  retrofit_generator: ^10.2.7
  # isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
